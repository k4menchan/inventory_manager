<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>在庫管理スキャナ</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121933;
      --panel2:#182140;
      --line:#2b3768;
      --text:#eef3ff;
      --muted:#98a6d8;
      --acc:#89a8ff;
      --ok:#79f0b4;
      --warn:#ffd36e;
      --danger:#ff7c92;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#0a0f1f,#121a33);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    .app{
      height:100dvh;
      display:grid;
      grid-template-rows: 1fr auto auto;
      gap:8px;
      padding:8px;
    }

    .camera{
      position:relative;
      min-height:0;
      background:#000;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    .scan-box{
      position:absolute;
      left:7%;
      right:7%;
      top:20%;
      bottom:28%;
      border:3px solid rgba(121,240,180,.95);
      border-radius:18px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.23);
      pointer-events:none;
      transition:.15s ease;
    }
    .scan-box.hit{
      border-color:#fff27d;
      transform:scale(1.02);
      box-shadow:0 0 0 9999px rgba(0,0,0,.20), 0 0 0 4px rgba(255,242,125,.25) inset;
    }

    .topbar{
      position:absolute;
      top:8px;
      left:8px;
      right:8px;
      display:flex;
      gap:8px;
      align-items:center;
      z-index:3;
    }

    .badge{
      background:rgba(9,13,27,.72);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .status{
      flex:1;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .flash{
      position:absolute;
      left:50%;
      top:16px;
      transform:translateX(-50%) translateY(-12px);
      background:linear-gradient(135deg,#8cffc7,#fff089);
      color:#08150e;
      padding:12px 18px;
      border-radius:999px;
      font-weight:900;
      font-size:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      opacity:0;
      pointer-events:none;
      z-index:5;
      transition:.2s ease;
    }
    .flash.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .controls{
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:8px;
    }

    .panel{
      background:rgba(18,25,51,.96);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px;
    }

    button,input{
      width:100%;
      min-width:0;
      border:none;
      outline:none;
      border-radius:14px;
      font:inherit;
    }

    button{
      padding:13px 10px;
      font-weight:800;
      color:var(--text);
      background:var(--panel2);
      border:1px solid var(--line);
    }
    button.primary{
      background:linear-gradient(135deg,#8babff,#9ff7ff);
      color:#09111f;
      border:none;
    }
    button.ok{
      background:linear-gradient(135deg,#86ffc2,#73ebb6);
      color:#082317;
      border:none;
    }
    button.danger{
      background:linear-gradient(135deg,#ffa1b1,#ff7c92);
      color:#fff;
      border:none;
    }

    .entry{
      display:grid;
      grid-template-columns: 1.5fr .8fr .9fr;
      gap:8px;
      margin-top:8px;
    }

    input{
      padding:14px 12px;
      color:var(--text);
      background:#101830;
      border:1px solid var(--line);
      text-align:center;
    }

    #lastCode{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:15px;
    }

    #qtyInput{
      font-size:24px;
      font-weight:900;
      background:#162344;
    }

    .summary{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:8px;
      align-items:center;
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
    }

    .list{
      margin-top:8px;
      max-height:26dvh;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#0f1630;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    td{
      border-bottom:1px solid #202b54;
      padding:10px 8px;
      vertical-align:middle;
    }
    tr:last-child td{border-bottom:none}

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      word-break:break-all;
    }
    .right{text-align:right}
    .mini-actions{
      display:flex;
      gap:6px;
      justify-content:flex-end;
    }
    .mini-actions button{
      width:auto;
      padding:8px 10px;
      min-height:unset;
      font-size:13px;
    }

    .qty-sheet{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:10px;
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      z-index:20;
    }
    .qty-sheet.show{
      opacity:1;
      pointer-events:auto;
    }
    .qty-card{
      width:min(560px,100%);
      background:#121933;
      border:1px solid var(--line);
      border-radius:22px 22px 16px 16px;
      padding:14px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .qty-title{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .qty-code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:16px;
      font-weight:800;
      word-break:break-all;
      margin-bottom:10px;
    }
    .qty-row{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .qty-pad{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:10px;
    }
    .qty-pad button{
      padding:16px 8px;
      font-size:20px;
      font-weight:900;
    }

    .focus-ring:focus{
      box-shadow:0 0 0 3px rgba(137,168,255,.35);
      border-color:#86a7ff;
    }

    @media (max-width:640px){
      .controls{grid-template-columns: repeat(4,1fr)}
      .entry{grid-template-columns: 1.35fr .75fr .9fr}
      button{padding:12px 8px;font-size:14px}
      .list{max-height:24dvh}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="camera">
      <video id="video" playsinline muted autoplay></video>
      <div id="scanBox" class="scan-box"></div>

      <div class="topbar">
        <div id="status" class="badge status">待機中</div>
        <div class="badge">件数 <span id="itemCount">0</span></div>
        <div class="badge">合計 <span id="totalQty">0</span></div>
      </div>

      <div id="flash" class="flash">読み取り成功</div>
    </section>

    <section class="panel">
      <div class="controls">
        <button id="startBtn" class="primary">開始</button>
        <button id="stopBtn">停止</button>
        <button id="switchBtn">切替</button>
        <button id="exportBtn" class="ok">CSV</button>
      </div>

      <div class="entry">
        <input id="lastCode" class="focus-ring" readonly placeholder="コード" />
        <input id="qtyInput" class="focus-ring" type="number" min="1" step="1" value="1" inputmode="numeric" />
        <button id="addBtn" class="ok">登録</button>
      </div>

      <div class="entry" style="margin-top:8px;">
        <input id="manualCode" class="focus-ring" inputmode="numeric" placeholder="手入力コード" />
        <button id="clearCurrentBtn">クリア</button>
        <button id="resetBtn" class="danger">全削除</button>
      </div>

      <div class="summary">
        <div id="smallStatus">準備OK</div>
        <div>同一JANは加算</div>
        <div id="cameraState">CAM:OFF</div>
      </div>

      <div class="list">
        <table>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <div id="qtySheet" class="qty-sheet">
      <div class="qty-card">
        <div class="qty-title">読み取ったコード</div>
        <div id="sheetCode" class="qty-code">-</div>

        <div class="entry" style="grid-template-columns:1fr .9fr;">
          <input id="sheetQty" class="focus-ring" type="number" min="1" step="1" value="1" inputmode="numeric" />
          <button id="sheetAddBtn" class="ok">登録</button>
        </div>

        <div class="qty-row">
          <button data-setqty="1">1</button>
          <button data-setqty="5">5</button>
          <button data-setqty="10">10</button>
        </div>

        <div class="qty-pad">
          <button data-key="1">1</button>
          <button data-key="2">2</button>
          <button data-key="3">3</button>
          <button data-key="4">4</button>
          <button data-key="5">5</button>
          <button data-key="6">6</button>
          <button data-key="7">7</button>
          <button data-key="8">8</button>
          <button data-key="9">9</button>
          <button data-key="clear">C</button>
          <button data-key="0">0</button>
          <button id="sheetCloseBtn">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const video = document.getElementById("video");
      const statusEl = document.getElementById("status");
      const smallStatusEl = document.getElementById("smallStatus");
      const cameraStateEl = document.getElementById("cameraState");
      const flashEl = document.getElementById("flash");
      const scanBoxEl = document.getElementById("scanBox");

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const switchBtn = document.getElementById("switchBtn");
      const exportBtn = document.getElementById("exportBtn");
      const addBtn = document.getElementById("addBtn");
      const clearCurrentBtn = document.getElementById("clearCurrentBtn");
      const resetBtn = document.getElementById("resetBtn");

      const lastCode = document.getElementById("lastCode");
      const manualCode = document.getElementById("manualCode");
      const qtyInput = document.getElementById("qtyInput");
      const tbody = document.getElementById("tbody");
      const itemCount = document.getElementById("itemCount");
      const totalQty = document.getElementById("totalQty");

      const qtySheet = document.getElementById("qtySheet");
      const sheetCode = document.getElementById("sheetCode");
      const sheetQty = document.getElementById("sheetQty");
      const sheetAddBtn = document.getElementById("sheetAddBtn");
      const sheetCloseBtn = document.getElementById("sheetCloseBtn");

      let stream = null;
      let detector = null;
      let scanning = false;
      let rafId = 0;
      let useBackCamera = true;
      let lastDetectedRaw = "";
      let lastDetectedAt = 0;
      let flashTimer = 0;
      let autoOpenQtySheet = true;

      const inventory = new Map();

      function setStatus(msg) {
        statusEl.textContent = msg;
        smallStatusEl.textContent = msg;
      }

      function normalizeCode(code) {
        return String(code || "").replace(/[^\dA-Za-z]/g, "").trim();
      }

      function isProbablyProductCode(code) {
        return /^\d{8}$/.test(code) || /^\d{12,14}$/.test(code);
      }

      function escapeCsv(value) {
        const s = String(value ?? "");
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }

      function updateSummary() {
        itemCount.textContent = String(inventory.size);
        let total = 0;
        for (const qty of inventory.values()) total += qty;
        totalQty.textContent = String(total);
      }

      function renderTable() {
        tbody.innerHTML = "";
        const entries = [...inventory.entries()].sort((a, b) => a[0].localeCompare(b[0]));

        if (!entries.length) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="3" style="text-align:center;color:#98a6d8;padding:16px;">まだ登録なし</td>`;
          tbody.appendChild(tr);
          updateSummary();
          return;
        }

        for (const [code, qty] of entries) {
          const tr = document.createElement("tr");

          const tdCode = document.createElement("td");
          tdCode.className = "mono";
          tdCode.textContent = code;

          const tdQty = document.createElement("td");
          tdQty.className = "right mono";
          tdQty.style.width = "64px";
          tdQty.textContent = String(qty);

          const tdActions = document.createElement("td");
          tdActions.style.width = "132px";

          const wrap = document.createElement("div");
          wrap.className = "mini-actions";

          const plusBtn = document.createElement("button");
          plusBtn.textContent = "+1";
          plusBtn.addEventListener("click", () => {
            inventory.set(code, (inventory.get(code) || 0) + 1);
            renderTable();
          });

          const minusBtn = document.createElement("button");
          minusBtn.textContent = "-1";
          minusBtn.addEventListener("click", () => {
            const next = (inventory.get(code) || 0) - 1;
            if (next <= 0) inventory.delete(code);
            else inventory.set(code, next);
            renderTable();
          });

          const delBtn = document.createElement("button");
          delBtn.textContent = "Del";
          delBtn.addEventListener("click", () => {
            inventory.delete(code);
            renderTable();
          });

          wrap.append(plusBtn, minusBtn, delBtn);
          tdActions.appendChild(wrap);

          tr.append(tdCode, tdQty, tdActions);
          tbody.appendChild(tr);
        }

        updateSummary();
      }

      function showFlash(text = "読み取り成功") {
        flashEl.textContent = text;
        flashEl.classList.add("show");
        scanBoxEl.classList.add("hit");
        clearTimeout(flashTimer);
        flashTimer = setTimeout(() => {
          flashEl.classList.remove("show");
          scanBoxEl.classList.remove("hit");
        }, 900);
      }

      function vibrateHit() {
        try {
          if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        } catch {}
      }

      function openQtySheet(code) {
        sheetCode.textContent = code || "-";
        sheetQty.value = qtyInput.value || "1";
        qtySheet.classList.add("show");
        setTimeout(() => {
          sheetQty.focus({ preventScroll: true });
          sheetQty.select?.();
        }, 30);
      }

      function closeQtySheet() {
        qtySheet.classList.remove("show");
      }

      function applyDetectedCode(code) {
        lastCode.value = code;
        manualCode.value = "";
        qtyInput.value = "1";
        showFlash(`読取 ${code}`);
        vibrateHit();
        setStatus(`読取成功: ${code}`);

        // 数量入力へ即移動
        qtyInput.focus({ preventScroll: true });
        qtyInput.select?.();

        // ポップアップも出す
        if (autoOpenQtySheet) {
          openQtySheet(code);
        }
      }

      function addCode(code, qty) {
        inventory.set(code, (inventory.get(code) || 0) + qty);
        renderTable();
      }

      function addCurrentCode() {
        const code = normalizeCode(lastCode.value || manualCode.value);
        const qty = Math.floor(Number(qtyInput.value));

        if (!code) {
          setStatus("コード未入力");
          return;
        }
        if (!isProbablyProductCode(code)) {
          setStatus("コード形式が不正っぽい");
          return;
        }
        if (!Number.isFinite(qty) || qty <= 0) {
          setStatus("数量は1以上");
          return;
        }

        addCode(code, qty);
        setStatus(`登録: ${code} × ${qty}`);
        showFlash(`登録 ${qty}`);
        lastCode.value = "";
        manualCode.value = "";
        qtyInput.value = "1";
        closeQtySheet();
      }

      function addFromSheet() {
        const code = normalizeCode(sheetCode.textContent);
        const qty = Math.floor(Number(sheetQty.value));
        if (!code || !isProbablyProductCode(code)) {
          setStatus("シート内コードが不正");
          return;
        }
        if (!Number.isFinite(qty) || qty <= 0) {
          setStatus("数量は1以上");
          return;
        }

        qtyInput.value = String(qty);
        addCode(code, qty);
        setStatus(`登録: ${code} × ${qty}`);
        showFlash(`登録 ${qty}`);
        lastCode.value = "";
        manualCode.value = "";
        qtyInput.value = "1";
        closeQtySheet();
      }

      function clearCurrent() {
        lastCode.value = "";
        manualCode.value = "";
        qtyInput.value = "1";
        closeQtySheet();
        setStatus("クリア");
      }

      function exportCsv() {
        const rows = [["JAN", "個数"]];
        for (const [code, qty] of [...inventory.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
          rows.push([code, String(qty)]);
        }

        const csv = rows.map(r => r.map(escapeCsv).join(",")).join("\r\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);

        const d = new Date();
        const p = n => String(n).padStart(2, "0");
        const name = `inventory_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.csv`;

        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        setStatus(`CSV出力: ${name}`);
      }

      async function initDetector() {
        if (!("BarcodeDetector" in window)) {
          detector = null;
          setStatus("BarcodeDetector未対応。手入力のみ");
          return false;
        }

        try {
          const formats = await window.BarcodeDetector.getSupportedFormats();
          const preferred = ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"];
          const useFormats = preferred.filter(f => formats.includes(f));
          detector = new window.BarcodeDetector(useFormats.length ? { formats: useFormats } : undefined);
          return true;
        } catch (err) {
          console.error(err);
          detector = null;
          setStatus("BarcodeDetector初期化失敗");
          return false;
        }
      }

      async function startCamera() {
        stopCamera();

        if (!window.isSecureContext) {
          setStatus("HTTPSで開いてね");
          return;
        }
        if (!navigator.mediaDevices) {
          setStatus("mediaDevicesなし");
          return;
        }
        if (!navigator.mediaDevices.getUserMedia) {
          setStatus("getUserMediaなし");
          return;
        }

        await initDetector();

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: useBackCamera ? { ideal: "environment" } : { ideal: "user" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          });

          video.srcObject = stream;
          await video.play();
          scanning = true;
          cameraStateEl.textContent = "CAM:ON";
          setStatus("カメラ起動");
          scanLoop();
        } catch (err) {
          console.error(err);
          if (err?.name === "NotAllowedError") setStatus("カメラ権限が拒否された");
          else if (err?.name === "NotFoundError") setStatus("カメラが見つからない");
          else if (err?.name === "NotReadableError") setStatus("他アプリがカメラ使用中かも");
          else setStatus("カメラ起動失敗: " + (err?.name || err));
        }
      }

      function stopCamera() {
        scanning = false;
        cameraStateEl.textContent = "CAM:OFF";
        if (rafId) cancelAnimationFrame(rafId);
        rafId = 0;

        if (video.srcObject) {
          for (const track of video.srcObject.getTracks()) track.stop();
          video.srcObject = null;
        }
        if (stream) {
          for (const track of stream.getTracks()) track.stop();
          stream = null;
        }
      }

      async function scanLoop() {
        if (!scanning) return;

        try {
          if (detector && video.readyState >= 2 && !qtySheet.classList.contains("show")) {
            const barcodes = await detector.detect(video);
            if (barcodes?.length) {
              const raw = normalizeCode(barcodes[0].rawValue);
              const now = Date.now();

              if (raw && isProbablyProductCode(raw)) {
                if (raw !== lastDetectedRaw || now - lastDetectedAt > 1800) {
                  lastDetectedRaw = raw;
                  lastDetectedAt = now;
                  applyDetectedCode(raw);
                }
              }
            }
          }
        } catch (err) {
          console.error(err);
        }

        rafId = requestAnimationFrame(scanLoop);
      }

      startBtn.addEventListener("click", startCamera);
      stopBtn.addEventListener("click", () => {
        stopCamera();
        setStatus("カメラ停止");
      });
      switchBtn.addEventListener("click", async () => {
        useBackCamera = !useBackCamera;
        await startCamera();
      });
      addBtn.addEventListener("click", addCurrentCode);
      clearCurrentBtn.addEventListener("click", clearCurrent);
      exportBtn.addEventListener("click", exportCsv);

      resetBtn.addEventListener("click", () => {
        if (!confirm("一覧を全削除する？")) return;
        inventory.clear();
        renderTable();
        setStatus("全削除");
      });

      manualCode.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          lastCode.value = normalizeCode(manualCode.value);
          qtyInput.focus({ preventScroll: true });
          qtyInput.select?.();
        }
      });

      qtyInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          addCurrentCode();
        }
      });

      sheetQty.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          addFromSheet();
        }
      });

      sheetAddBtn.addEventListener("click", addFromSheet);
      sheetCloseBtn.addEventListener("click", closeQtySheet);
      qtySheet.addEventListener("click", e => {
        if (e.target === qtySheet) closeQtySheet();
      });

      document.querySelectorAll("[data-setqty]").forEach(btn => {
        btn.addEventListener("click", () => {
          sheetQty.value = btn.dataset.setqty;
          sheetQty.focus({ preventScroll: true });
        });
      });

      document.querySelectorAll("[data-key]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          if (key === "clear") {
            sheetQty.value = "";
          } else {
            sheetQty.value = (sheetQty.value === "0" ? "" : sheetQty.value) + key;
          }
          sheetQty.focus({ preventScroll: true });
        });
      });

      renderTable();
      setStatus(window.isSecureContext ? "準備OK" : "HTTPSで開いてね");
    })();
  </script>
