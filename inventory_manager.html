<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>在庫管理スキャナ</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --panel2: #1f2540;
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent: #7c9cff;
      --accent2: #97f0ff;
      --danger: #ff7b8b;
      --ok: #7dffb3;
      --border: #2a3258;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #0c1020, #141a2f);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1.1fr 0.9fr;
    }
    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: rgba(23, 27, 46, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.24);
    }
    .video-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #000;
      aspect-ratio: 3 / 4;
      width: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .scan-box {
      position: absolute;
      inset: 18% 8%;
      border: 3px solid rgba(151,240,255,.9);
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.26);
      pointer-events: none;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .row > * {
      min-width: 0;
    }
    button, input, select {
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      color: var(--text);
      background: var(--panel2);
    }
    button {
      cursor: pointer;
      font-weight: 700;
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0c1020;
      border: none;
    }
    button.danger {
      background: linear-gradient(135deg, #ff9aa6, var(--danger));
      color: white;
      border: none;
    }
    button.ok {
      background: linear-gradient(135deg, #84ffc1, #72e8b7);
      color: #082316;
      border: none;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #11162a;
      color: var(--muted);
      min-height: 44px;
      line-height: 1.5;
      border: 1px solid var(--border);
    }
    .field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .field label {
      color: var(--muted);
      font-size: 14px;
    }
    .field input {
      width: 100%;
    }
    .pair {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 10px;
    }
    @media (max-width: 520px) {
      .pair {
        grid-template-columns: 1fr;
      }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 14px;
      background: #12172b;
    }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #222b4d;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-weight: 700;
      background: #151c35;
      position: sticky;
      top: 0;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .table-wrap {
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .pill {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #121933;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .right {
      text-align: right;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>在庫管理スキャナ</h1>
    <div class="sub">
      バーコードを読み取って JAN と数量を登録し、最後に CSV 出力できます。
      同じコードを再度登録した場合は数量を加算します。
    </div>

    <div class="grid">
      <section class="card">
        <div class="video-wrap">
          <video id="video" playsinline muted autoplay></video>
          <div class="scan-box"></div>
        </div>

        <div class="row">
          <button id="startBtn" class="primary">カメラ開始</button>
          <button id="stopBtn">停止</button>
          <button id="switchBtn">前/背面 切替</button>
        </div>

        <div class="status" id="status">待機中</div>

        <div class="field">
          <label for="manualCode">手入力JAN / EAN / UPC</label>
          <input id="manualCode" inputmode="numeric" placeholder="例: 4901234567894" />
        </div>

        <div class="pair">
          <div class="field">
            <label for="lastCode">読取コード</label>
            <input id="lastCode" class="mono" readonly placeholder="未読取" />
          </div>
          <div class="field">
            <label for="qtyInput">数量</label>
            <input id="qtyInput" type="number" min="1" step="1" value="1" />
          </div>
        </div>

        <div class="row">
          <button id="addBtn" class="ok">この内容で登録</button>
          <button id="clearCurrentBtn">読取欄クリア</button>
        </div>

        <div class="small" style="margin-top:12px;">
          <span class="pill">対応例: EAN-13 / EAN-8 / UPC</span>
          <span class="pill">同一JANは加算</span>
          <span class="pill">CSV出力あり</span>
        </div>
      </section>

      <section class="card">
        <div class="actions">
          <button id="exportBtn" class="primary">CSV出力</button>
          <button id="resetBtn" class="danger">一覧を全削除</button>
        </div>

        <div class="small" style="margin-top:10px;">
          件数: <span id="itemCount">0</span> /
          合計数量: <span id="totalQty">0</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>JAN / コード</th>
                <th class="right">数量</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const video = document.getElementById("video");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const switchBtn = document.getElementById("switchBtn");
      const manualCode = document.getElementById("manualCode");
      const lastCode = document.getElementById("lastCode");
      const qtyInput = document.getElementById("qtyInput");
      const addBtn = document.getElementById("addBtn");
      const clearCurrentBtn = document.getElementById("clearCurrentBtn");
      const exportBtn = document.getElementById("exportBtn");
      const resetBtn = document.getElementById("resetBtn");
      const tbody = document.getElementById("tbody");
      const itemCount = document.getElementById("itemCount");
      const totalQty = document.getElementById("totalQty");

      /** @type {MediaStream|null} */
      let stream = null;
      let detector = null;
      let scanning = false;
      let rafId = 0;
      let useBackCamera = true;
      let lastDetectedRaw = "";
      let lastDetectedAt = 0;

      // JAN -> qty
      const inventory = new Map();

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function normalizeCode(code) {
        return String(code || "").replace(/[^\dA-Za-z]/g, "").trim();
      }

      function isProbablyProductCode(code) {
        return /^\d{8}$/.test(code) || /^\d{12,14}$/.test(code);
      }

      function escapeCsv(value) {
        const s = String(value ?? "");
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
        return s;
      }

      function updateSummary() {
        itemCount.textContent = String(inventory.size);
        let total = 0;
        for (const qty of inventory.values()) total += qty;
        totalQty.textContent = String(total);
      }

      function renderTable() {
        tbody.innerHTML = "";
        const entries = [...inventory.entries()].sort((a, b) => a[0].localeCompare(b[0]));

        for (const [code, qty] of entries) {
          const tr = document.createElement("tr");

          const tdCode = document.createElement("td");
          tdCode.className = "mono";
          tdCode.textContent = code;

          const tdQty = document.createElement("td");
          tdQty.className = "right mono";
          tdQty.textContent = String(qty);

          const tdActions = document.createElement("td");
          const plusBtn = document.createElement("button");
          plusBtn.textContent = "+1";
          plusBtn.addEventListener("click", () => {
            inventory.set(code, (inventory.get(code) || 0) + 1);
            renderTable();
          });

          const minusBtn = document.createElement("button");
          minusBtn.textContent = "-1";
          minusBtn.addEventListener("click", () => {
            const next = (inventory.get(code) || 0) - 1;
            if (next <= 0) inventory.delete(code);
            else inventory.set(code, next);
            renderTable();
          });

          const delBtn = document.createElement("button");
          delBtn.textContent = "削除";
          delBtn.addEventListener("click", () => {
            inventory.delete(code);
            renderTable();
          });

          tdActions.appendChild(plusBtn);
          tdActions.appendChild(minusBtn);
          tdActions.appendChild(delBtn);

          tr.appendChild(tdCode);
          tr.appendChild(tdQty);
          tr.appendChild(tdActions);
          tbody.appendChild(tr);
        }

        updateSummary();
      }

      function addCurrentCode() {
        const code = normalizeCode(lastCode.value || manualCode.value);
        const qty = Math.floor(Number(qtyInput.value));

        if (!code) {
          setStatus("コードが空です。読取するか、手入力してください。");
          return;
        }
        if (!isProbablyProductCode(code)) {
          setStatus("コード形式が想定外です。8桁または12〜14桁程度の数字を推奨します。");
          return;
        }
        if (!Number.isFinite(qty) || qty <= 0) {
          setStatus("数量は 1 以上で入力してください。");
          return;
        }

        inventory.set(code, (inventory.get(code) || 0) + qty);
        renderTable();

        setStatus(`登録しました: ${code} / 数量 ${qty}`);
        lastCode.value = "";
        manualCode.value = "";
        qtyInput.value = "1";
      }

      function clearCurrent() {
        lastCode.value = "";
        manualCode.value = "";
        qtyInput.value = "1";
        setStatus("入力欄をクリアしました。");
      }

      function exportCsv() {
        const rows = [["JAN", "個数"]];
        for (const [code, qty] of [...inventory.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
          rows.push([code, String(qty)]);
        }

        const csv = rows.map(cols => cols.map(escapeCsv).join(",")).join("\r\n");
        const bom = "\uFEFF";
        const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);

        const now = new Date();
        const pad = n => String(n).padStart(2, "0");
        const name = `inventory_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.csv`;

        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus(`CSVを出力しました: ${name}`);
      }

      async function initDetector() {
        if (!("BarcodeDetector" in window)) {
          detector = null;
          setStatus("このブラウザでは BarcodeDetector が使えません。手入力で運用してください。");
          return false;
        }

        try {
          const formats = await window.BarcodeDetector.getSupportedFormats();
          const preferred = ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"];
          const useFormats = preferred.filter(f => formats.includes(f));
          detector = new window.BarcodeDetector(
            useFormats.length ? { formats: useFormats } : undefined
          );
          return true;
        } catch (err) {
          console.error(err);
          detector = null;
          setStatus("BarcodeDetector の初期化に失敗しました。手入力を使ってください。");
          return false;
        }
      }

      async function startCamera() {
        stopCamera();

        if (!navigator.mediaDevices?.getUserMedia) {
          setStatus("この端末/ブラウザではカメラAPIが使えません。");
          return;
        }

        await initDetector();

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: useBackCamera ? { ideal: "environment" } : { ideal: "user" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          });

          video.srcObject = stream;
          await video.play();

          scanning = true;
          setStatus("カメラ起動中。バーコードを枠内に入れてください。");
          scanLoop();
        } catch (err) {
          console.error(err);
          setStatus("カメラ起動に失敗しました。HTTPS か、ブラウザ権限を確認してください。");
        }
      }

      function stopCamera() {
        scanning = false;
        if (rafId) cancelAnimationFrame(rafId);
        rafId = 0;

        if (video.srcObject) {
          const tracks = video.srcObject.getTracks();
          tracks.forEach(track => track.stop());
          video.srcObject = null;
        }
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      async function scanLoop() {
        if (!scanning) return;

        try {
          if (detector && video.readyState >= 2) {
            const barcodes = await detector.detect(video);
            if (barcodes && barcodes.length > 0) {
              const raw = normalizeCode(barcodes[0].rawValue);
              const now = Date.now();

              if (raw && isProbablyProductCode(raw)) {
                // 同一コードの連続検出を少し抑制
                if (raw !== lastDetectedRaw || now - lastDetectedAt > 1500) {
                  lastDetectedRaw = raw;
                  lastDetectedAt = now;
                  lastCode.value = raw;
                  setStatus(`読取成功: ${raw}　数量を確認して「この内容で登録」を押してください。`);
                  if (navigator.vibrate) navigator.vibrate(60);
                }
              }
            }
          }
        } catch (err) {
          console.error(err);
        }

        rafId = requestAnimationFrame(scanLoop);
      }

      startBtn.addEventListener("click", startCamera);
      stopBtn.addEventListener("click", () => {
        stopCamera();
        setStatus("カメラを停止しました。");
      });
      switchBtn.addEventListener("click", async () => {
        useBackCamera = !useBackCamera;
        await startCamera();
      });
      addBtn.addEventListener("click", addCurrentCode);
      clearCurrentBtn.addEventListener("click", clearCurrent);
      exportBtn.addEventListener("click", exportCsv);
      resetBtn.addEventListener("click", () => {
        if (!confirm("一覧をすべて削除します。よろしいですか？")) return;
        inventory.clear();
        renderTable();
        setStatus("一覧を全削除しました。");
      });

      manualCode.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addCurrentCode();
        }
      });

      qtyInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addCurrentCode();
        }
      });

      renderTable();

      if (!window.isSecureContext) {
        setStatus("注意: このページは安全なコンテキストではありません。カメラ読取には HTTPS が必要な場合があります。");
      } else {
        setStatus("準備OK。「カメラ開始」を押してください。");
      }
    })();
  </script>
</body>
</html>
