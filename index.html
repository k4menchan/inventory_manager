<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>在庫管理スキャナ</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121933;
      --panel2:#182140;
      --line:#2b3768;
      --text:#eef3ff;
      --muted:#98a6d8;
      --ok:#79f0b4;
      --danger:#ff7c92;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#0a0f1f,#121a33);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    .app{
      height:100dvh;
      display:grid;
      grid-template-rows: 1fr auto;
      gap:8px;
      padding:8px;
    }

    .camera{
      position:relative;
      min-height:0;
      background:#000;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    /* 見た目の枠。実際の検出範囲にかなり近づけてある */
    .scan-box{
      position:absolute;
      left:16%;
      right:16%;
      top:28%;
      bottom:34%;
      border:3px solid rgba(121,240,180,.95);
      border-radius:18px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.23);
      pointer-events:none;
      transition:.15s ease;
    }
    .scan-box.hit{
      border-color:#fff27d;
      transform:scale(1.02);
      box-shadow:0 0 0 9999px rgba(0,0,0,.20), 0 0 0 4px rgba(255,242,125,.25) inset;
    }

    .topbar{
      position:absolute;
      top:8px;
      left:8px;
      right:8px;
      display:grid;
      grid-template-columns:minmax(150px,1.5fr) minmax(110px,1.1fr) repeat(3,minmax(64px,.55fr));
      gap:8px;
      align-items:stretch;
      z-index:3;
    }

    .stat-card{
      background:rgba(9,13,27,.72);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      border-radius:14px;
      padding:6px 10px 8px;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
      justify-content:center;
    }

    .stat-status{
      flex:1;
      min-width:170px;
    }

    .stat-small{
      min-width:68px;
      align-items:center;
    }

    .stat-label{
      font-size:10px;
      line-height:1;
      opacity:.7;
      white-space:nowrap;
    }

    .stat-value{
      min-width:0;
      font-size:14px;
      font-weight:800;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }


    .level-normal{
      border-color:rgba(255,255,255,.12);
    }

    .level-success{
      border-color:rgba(121,240,180,.55);
      background:rgba(20,65,47,.72);
    }

    .level-caution{
      border-color:rgba(255,211,110,.55);
      background:rgba(72,58,18,.78);
    }

    .level-warning{
      border-color:rgba(255,124,146,.65);
      background:rgba(78,23,35,.82);
    }

    .flash{
      position:absolute;
      left:50%;
      top:16px;
      transform:translateX(-50%) translateY(-12px);
      background:linear-gradient(135deg,#8cffc7,#fff089);
      color:#08150e;
      padding:12px 18px;
      border-radius:999px;
      font-weight:900;
      font-size:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      opacity:0;
      pointer-events:none;
      z-index:5;
      transition:.2s ease;
      max-width:92vw;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .flash.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .camera-guide{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      max-width:92vw;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(9,13,27,.82);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:14px;
      font-weight:800;
      text-align:center;
      z-index:6;
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    
    .camera-guide.show{
      opacity:1;
    }
    
    /* 入力待ち中は上へ移動 */
    .camera-guide.input-mode{
      top:56px;
      bottom:auto;
    }


    .panel{
      background:rgba(18,25,51,.96);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px;
    }

    .controls{
      display:grid;
      grid-template-columns: repeat(7,1fr);
      gap:8px;
    }

    #scanModeBtn.active{
      background:linear-gradient(135deg,#86ffc2,#73ebb6);
      color:#082317;
      border:none;
    }

    .entry{
      display:grid;
      grid-template-columns: 1.1fr 1.4fr .55fr .7fr .7fr;
      gap:8px;
      margin-top:8px;
    }

    button,input{
      width:100%;
      min-width:0;
      border:none;
      outline:none;
      border-radius:14px;
      font:inherit;
    }

    button{
      padding:13px 10px;
      font-weight:800;
      color:var(--text);
      background:var(--panel2);
      border:1px solid var(--line);
    }
    button.primary{
      background:linear-gradient(135deg,#8babff,#9ff7ff);
      color:#09111f;
      border:none;
    }
    button.ok{
      background:linear-gradient(135deg,#86ffc2,#73ebb6);
      color:#082317;
      border:none;
    }
    button.danger{
      background:linear-gradient(135deg,#ffa1b1,#ff7c92);
      color:#fff;
      border:none;
    }

    input{
      padding:14px 12px;
      color:var(--text);
      background:#101830;
      border:1px solid var(--line);
      text-align:center;
    }

    #lastCode,#sheetCode{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:15px;
    }

    #productName{
      text-align:left;
      font-size:14px;
    }

    #qtyInput,#sheetQty{
      font-size:24px;
      font-weight:900;
      background:#162344;
    }

    #lastCode,#productName{
      font-size:14px;
    }

    .list{
      margin-top:8px;
      max-height:25dvh;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#0f1630;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    td{
      border-bottom:1px solid #202b54;
      padding:10px 8px;
      vertical-align:middle;
    }
    tr:last-child td{border-bottom:none}

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      word-break:break-all;
    }

    .right{text-align:right}

    .mini-actions{
      display:flex;
      gap:6px;
      justify-content:flex-end;
    }
    .mini-actions button{
      width:auto;
      padding:8px 10px;
      min-height:unset;
      font-size:13px;
    }

    .qty-sheet{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:10px;
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      z-index:20;
    }
    .qty-sheet.show{
      opacity:1;
      pointer-events:auto;
    }

    .qty-card{
      width:min(620px,100%);
      background:#121933;
      border:1px solid var(--line);
      border-radius:22px 22px 16px 16px;
      padding:14px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    .qty-title{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .qty-code{
      font-size:16px;
      font-weight:800;
      word-break:break-all;
      margin-bottom:8px;
    }

    .qty-name{
      font-size:14px;
      margin-bottom:10px;
      color:#dfe7ff;
      min-height:20px;
      word-break:break-word;
    }

    .qty-row{
      display:grid;
      grid-template-columns: 1.2fr .8fr .8fr;
      gap:8px;
      margin-top:10px;
    }

    .qty-pad{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:10px;
    }
    .qty-pad button{
      padding:16px 8px;
      font-size:20px;
      font-weight:900;
    }

    .sheet-actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }

    .focus-ring:focus{
      box-shadow:0 0 0 3px rgba(137,168,255,.35);
      border-color:#86a7ff;
    }

    @media (max-width:780px){
      .topbar{
        grid-template-columns:1.2fr 1.2fr repeat(3,.7fr);
      }
      .controls{grid-template-columns: repeat(4,1fr)}
      .entry{grid-template-columns: 1fr 1.2fr .7fr .75fr .7fr}
      .list{max-height:23dvh}
      button{padding:12px 8px;font-size:14px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="camera">
      <video id="video" playsinline muted autoplay></video>
      <div id="scanBox" class="scan-box"></div>

      <div class="topbar">
        <div id="statusCard" class="stat-card stat-status level-normal">
          <div class="stat-label">ステータス</div>
          <div id="status" class="stat-value">商品リスト読み込み中...</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">前回登録</div>
          <div id="lastRegistered" class="stat-value">-</div>
        </div>
        <div class="stat-card stat-small">
          <div class="stat-label">件数</div>
          <div id="itemCount" class="stat-value">0</div>
        </div>
        <div class="stat-card stat-small">
          <div class="stat-label">合計</div>
          <div id="totalQty" class="stat-value">0</div>
        </div>
        <div class="stat-card stat-small">
          <div class="stat-label">商品リスト</div>
          <div id="masterCount" class="stat-value">0</div>
        </div>
      </div>

      <div id="flash" class="flash">読み取り成功</div>
      <div id="cameraGuide" class="camera-guide show">商品リスト読み込み中...</div>
    </section>

    <section class="panel">
      <div class="controls">
        <button id="startBtn" class="primary">開始</button>
        <button id="stopBtn">停止</button>
        <button id="switchBtn">切替</button>
        <button id="scanModeBtn">連続モード OFF</button>
        <button id="exportBtn" class="ok">CSV出力</button>
        <button id="copyBtn" class="ok">コピー</button>
        <button id="resetBtn" class="danger">全削除</button>
      </div>

      <div class="entry">
        <input id="lastCode" class="focus-ring" inputmode="numeric" placeholder="コード" />
        <input id="productName" class="focus-ring" placeholder="商品名" />
        <input id="qtyInput" class="focus-ring" type="number" min="1" step="1" value="1" inputmode="numeric" />
        <button id="addBtn" class="ok">登録</button>
        <button id="clearCurrentBtn">クリア</button>
      </div>

      <div class="list">
        <table>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <div id="qtySheet" class="qty-sheet">
      <div class="qty-card">
        <div class="qty-title">読み取ったコード</div>
        <div id="sheetCode" class="qty-code">-</div>
        <div id="sheetName" class="qty-name"></div>

        <div class="qty-row">
          <input id="sheetNameInput" class="focus-ring" placeholder="商品名" />
          <input id="sheetQty" class="focus-ring" type="number" min="1" step="1" value="1" inputmode="numeric" />
          <button id="sheetAddBtn" class="ok">登録</button>
        </div>

        <div class="qty-pad">
          <button data-setqty="1">1</button>
          <button data-setqty="5">5</button>
          <button data-setqty="10">10</button>
          <button data-key="1">1</button>
          <button data-key="2">2</button>
          <button data-key="3">3</button>
          <button data-key="4">4</button>
          <button data-key="5">5</button>
          <button data-key="6">6</button>
          <button data-key="7">7</button>
          <button data-key="8">8</button>
          <button data-key="9">9</button>
          <button data-key="clear">C</button>
          <button data-key="0">0</button>
          <button id="sheetCloseBtn">閉じる</button>
        </div>

        <div class="sheet-actions">
          <button id="sheetCancelBtn">キャンセル</button>
          <button id="sheetClearBtn">入力クリア</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const video = document.getElementById("video");
      const statusEl = document.getElementById("status");
      const statusCardEl = document.getElementById("statusCard");
      const lastRegisteredEl = document.getElementById("lastRegistered");
      const flashEl = document.getElementById("flash");
      const scanBoxEl = document.getElementById("scanBox");
      const cameraGuide = document.getElementById("cameraGuide");

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const switchBtn = document.getElementById("switchBtn");
      const scanModeBtn = document.getElementById("scanModeBtn");
      const exportBtn = document.getElementById("exportBtn");
      const copyBtn = document.getElementById("copyBtn");
      const addBtn = document.getElementById("addBtn");
      const clearCurrentBtn = document.getElementById("clearCurrentBtn");
      const resetBtn = document.getElementById("resetBtn");

      const lastCode = document.getElementById("lastCode");
      const productName = document.getElementById("productName");
      const qtyInput = document.getElementById("qtyInput");
      const tbody = document.getElementById("tbody");
      const itemCount = document.getElementById("itemCount");
      const totalQty = document.getElementById("totalQty");
      const masterCount = document.getElementById("masterCount");

      const qtySheet = document.getElementById("qtySheet");
      const sheetCode = document.getElementById("sheetCode");
      const sheetName = document.getElementById("sheetName");
      const sheetNameInput = document.getElementById("sheetNameInput");
      const sheetQty = document.getElementById("sheetQty");
      const sheetAddBtn = document.getElementById("sheetAddBtn");
      const sheetCloseBtn = document.getElementById("sheetCloseBtn");
      const sheetCancelBtn = document.getElementById("sheetCancelBtn");
      const sheetClearBtn = document.getElementById("sheetClearBtn");

      // 中央切り出し用 canvas
      const detectCanvas = document.createElement("canvas");
      const detectCtx = detectCanvas.getContext("2d", { willReadFrequently: true });

      let stream = null;
      let detector = null;
      let scanning = false;
      let rafId = 0;
      let useBackCamera = true;
      let lastDetectedRaw = "";
      let lastDetectedAt = 0;
      let flashTimer = 0;
      let autoOpenQtySheet = true;
      let continuousScanMode = false;
      let lastRegisteredCode = "";
      let lastRegisteredQty = 0;
      let lastRegisteredName = "-";

      let candidateCode = "";
      let candidateCount = 0;
      const REQUIRED_CONSECUTIVE_DETECTIONS = 2;
      const SCAN_COOLDOWN_MS = 2200;

      // 中央だけ読むための切り出し比率
      const DETECT_REGION = {
        x: 0.10,
        y: 0.20,
        w: 0.80,
        h: 0.55
      };

      let audioCtx = null;

      let wakeLock = null;

      async function acquireWakeLock() {
        try {
          if (!("wakeLock" in navigator)) return;
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch (err) {
          console.error("Wake Lock error:", err);
        }
      }
      
      async function releaseWakeLock() {
        try {
          if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
          }
        } catch (err) {
          console.error("Wake Lock release error:", err);
        }
      }
      
      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "visible" && scanning) {
          await acquireWakeLock();
        }
      });

      const inventory = new Map();
      const productMaster = new Map();

      function setStatus(msg, level = "normal") {
        statusEl.textContent = msg;
        statusCardEl.classList.remove("level-normal", "level-success", "level-caution", "level-warning");
        statusCardEl.classList.add(
          level === "success" ? "level-success" :
          level === "caution" ? "level-caution" :
          level === "warning" ? "level-warning" : "level-normal"
        );
      }

      function truncateText(text, max = 20) {
        const s = String(text || "").trim();
        return s.length > max ? s.slice(0, max) + "…" : s;
      }

      function updateLastRegistered(code = "", qty = 0, name = "") {
        lastRegisteredCode = code || "";
        lastRegisteredQty = qty || 0;
        const base = name ? truncateText(name, 20) : (code || "");
        lastRegisteredName = code ? `${base} ×${qty}` : "-";
        if (lastRegisteredEl) lastRegisteredEl.textContent = lastRegisteredName;
      }

      function showCameraGuide(message, mode = "normal") {
        cameraGuide.textContent = message;
        setCameraGuideMode(mode);
        cameraGuide.classList.add("show");
      }

      function setCameraGuideMode(mode = "normal") {
        cameraGuide.classList.remove("input-mode");
        if (mode === "input") {
          cameraGuide.classList.add("input-mode");
        }
      }

      function hideCameraGuide() {
        cameraGuide.classList.remove("show");
      }

      function setStartGuide(active) {
        if (active) {
          showCameraGuide("商品リスト読み込みOK / 開始を押してね", "normal");
        } else {
          hideCameraGuide();
        }
      }

      function showInputWaitGuide() {
        showCameraGuide("外側タップで閉じる", "input");
      }

      function normalizeCode(code) {
        return String(code || "").replace(/[^\dA-Za-z]/g, "").trim();
      }

      function normalizeName(name) {
        return String(name || "").trim();
      }

      function isProbablyProductCode(code) {
        return /^\d{8}$/.test(code) || /^\d{12}$/.test(code) || /^\d{13}$/.test(code);
      }

      function escapeCsv(value) {
        const s = String(value ?? "");
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }

      function getMasterName(code) {
        return productMaster.get(code) || "";
      }

      function getStoredName(code) {
        return inventory.get(code)?.name || getMasterName(code) || "";
      }

      function isConsecutiveRegisteredScan(code) {
        return !!code && code === lastRegisteredCode;
      }

      function updateMasterSummary() {
        masterCount.textContent = String(productMaster.size);
      }

      function updateSummary() {
        let total = 0;
        for (const row of inventory.values()) total += row.qty;
        if (itemCount) itemCount.textContent = String(inventory.size);
        totalQty.textContent = String(total);
      }

      function renderTable() {
        tbody.innerHTML = "";
        const entries = [...inventory.entries()].reverse();

        if (!entries.length) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="4" style="text-align:center;color:#98a6d8;padding:16px;">まだ登録なし</td>`;
          tbody.appendChild(tr);
          updateSummary();
          return;
        }

        for (const [code, row] of entries) {
          const tr = document.createElement("tr");

          const tdCode = document.createElement("td");
          tdCode.className = "mono";
          tdCode.style.width = "27%";
          tdCode.textContent = code;

          const tdName = document.createElement("td");
          tdName.style.width = "43%";
          tdName.textContent = row.name || "";

          const tdQty = document.createElement("td");
          tdQty.className = "right mono";
          tdQty.style.width = "10%";
          tdQty.textContent = String(row.qty);

          const tdActions = document.createElement("td");
          tdActions.style.width = "20%";

          const wrap = document.createElement("div");
          wrap.className = "mini-actions";

          const plusBtn = document.createElement("button");
          plusBtn.textContent = "+1";
          plusBtn.addEventListener("click", () => {
            row.qty += 1;
            touchInventoryOrder(code, row);
            feedbackQty();
            renderTable();
          });

          const minusBtn = document.createElement("button");
          minusBtn.textContent = "-1";
          minusBtn.addEventListener("click", () => {
            row.qty -= 1;
            if (row.qty <= 0) {
              inventory.delete(code);
            } else {
              touchInventoryOrder(code, row);
            }
            feedbackQty();
            renderTable();
          });

          const delBtn = document.createElement("button");
          delBtn.textContent = "Del";
          delBtn.addEventListener("click", () => {
            inventory.delete(code);
            renderTable();
          });

          wrap.append(plusBtn, minusBtn, delBtn);
          tdActions.appendChild(wrap);
          tr.append(tdCode, tdName, tdQty, tdActions);
          tbody.appendChild(tr);
        }

        updateSummary();
      }

      function showFlash(text = "読み取り成功") {
        flashEl.textContent = text;
        flashEl.classList.add("show");
        scanBoxEl.classList.add("hit");
        clearTimeout(flashTimer);
        flashTimer = setTimeout(() => {
          flashEl.classList.remove("show");
          scanBoxEl.classList.remove("hit");
        }, 900);
      }

      function vibrate(pattern) {
        try {
          if (navigator.vibrate) navigator.vibrate(pattern);
        } catch {}
      }

      function ensureAudioContext() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        if (!audioCtx) audioCtx = new Ctx();
        if (audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
        return audioCtx;
      }

      function playTone(freq = 880, duration = 0.08, type = "sine", gainValue = 0.04, whenOffset = 0) {
        const ctx = ensureAudioContext();
        if (!ctx) return;
        const now = ctx.currentTime + whenOffset;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function soundHitMatched() {
        playTone(1046, 0.06, "triangle", 0.05, 0);
        playTone(1318, 0.08, "triangle", 0.05, 0.05);
      }

      function soundHitUnmatched() {
        playTone(440, 0.10, "sawtooth", 0.04, 0);
      }

      function soundQty() {
        playTone(740, 0.04, "square", 0.025, 0);
      }

      function soundRegistered() {
        playTone(880, 0.05, "triangle", 0.04, 0);
        playTone(1174, 0.06, "triangle", 0.045, 0.05);
        playTone(1567, 0.09, "triangle", 0.05, 0.10);
      }

      function feedbackQty() {
        soundQty();
        vibrate(20);
      }

      function setDetectedFields(code, name = "") {
        lastCode.value = code || "";
        productName.value = name || "";
      }

      function openQtySheet(code, name) {
        sheetCode.textContent = code || "-";
        sheetName.textContent = name || "商品名未登録";
        sheetNameInput.value = name || "";
        sheetQty.value = qtyInput.value || "1";
        qtySheet.classList.add("show");
        showInputWaitGuide();

        setTimeout(() => {
          if (sheetNameInput.value) {
            sheetQty.focus({ preventScroll: true });
            sheetQty.select?.();
          } else {
            sheetNameInput.focus({ preventScroll: true });
            sheetNameInput.select?.();
          }
        }, 30);
      }

      function closeQtySheet() {
        qtySheet.classList.remove("show");
        setCameraGuideMode("normal");
      
        if (scanning) {
          hideCameraGuide();
        } else {
          setStartGuide(true);
        }
      }

      function cancelInputWait() {
        setDetectedFields("", "");
        qtyInput.value = "1";
        closeQtySheet();
      }

      function clearSheetInputs() {
        sheetNameInput.value = "";
        sheetQty.value = "1";
        sheetNameInput.focus({ preventScroll: true });
      }

      function applyDetectedCode(code) {
        const matchedName = getStoredName(code);
        const alreadyRegistered = inventory.has(code);
        const consecutive = isConsecutiveRegisteredScan(code);

        if (continuousScanMode && matchedName) {
          addInventory(code, matchedName, 1);
          renderTable();
          updateMasterSummary();
          updateLastRegistered(code, inventory.get(code)?.qty || 1, matchedName);
          showFlash(consecutive ? `連続 +1` : `+1`);
          soundRegistered();
          vibrate([35, 20, 50]);

          if (consecutive) {
            setStatus(`同じ商品を連続スキャン: ${code} を +1`, "warning");
          } else if (alreadyRegistered) {
            setStatus(`登録済み商品を再スキャン: ${code} を +1`, "caution");
          } else {
            setStatus(`連続モードで登録: ${code} × 1`, "success");
          }
          return;
        }

        setDetectedFields(code, matchedName);
        qtyInput.value = "1";

        showFlash(matchedName ? `読取 ${code}` : `読取 ${code} / 名称未登録`);
        vibrate(matchedName ? [40, 30, 40] : [120]);

        if (matchedName) soundHitMatched();
        else soundHitUnmatched();

        if (consecutive) {
          setStatus(`同じ商品を連続スキャン: ${code}`, "warning");
        } else if (alreadyRegistered) {
          setStatus(`登録済み商品を再スキャン: ${code}`, "caution");
        } else if (matchedName) {
          setStatus(`読取成功: ${code}`, "success");
        } else {
          setStatus(`読取成功: ${code}（商品名未登録）`, "normal");
        }

        if (autoOpenQtySheet) {
          openQtySheet(code, matchedName);
        } else {
          if (matchedName) {
            qtyInput.focus({ preventScroll: true });
            qtyInput.select?.();
          } else {
            productName.focus({ preventScroll: true });
            productName.select?.();
          }
        }
      }

      function addOrUpdateMaster(code, name) {
        const cleanCode = normalizeCode(code);
        const cleanName = normalizeName(name);
        if (!cleanCode || !cleanName) return;
        productMaster.set(cleanCode, cleanName);
      }

      function touchInventoryOrder(code, row) {
        inventory.delete(code);
        inventory.set(code, row);
      }

      function addInventory(code, name, qty) {
        const current = inventory.get(code);
        if (current) {
          current.qty += qty;
          if (name) current.name = name;
          touchInventoryOrder(code, current);
        } else {
          inventory.set(code, { name: name || "", qty });
        }
      }

      function addCurrentCode() {
        const code = normalizeCode(lastCode.value);
        const inputName = normalizeName(productName.value || getMasterName(code));
        const qty = Math.floor(Number(qtyInput.value));

        if (!code) return setStatus("コード未入力");
        if (!isProbablyProductCode(code)) return setStatus("コード形式が不正っぽい");
        if (!Number.isFinite(qty) || qty <= 0) return setStatus("数量は1以上");
        if (!inputName) return setStatus("商品名が空です");

        addOrUpdateMaster(code, inputName);
        addInventory(code, inputName, qty);
        renderTable();
        updateMasterSummary();

        updateLastRegistered(code, inventory.get(code)?.qty || qty);
        setStatus(`登録完了`, "success");
        showFlash(`登録 ${qty}`);
        soundRegistered();
        vibrate([50, 30, 70]);

        setDetectedFields("", "");
        qtyInput.value = "1";
        closeQtySheet();
      }

      function addFromSheet() {
        const code = normalizeCode(sheetCode.textContent);
        const name = normalizeName(sheetNameInput.value || getMasterName(code));
        const qty = Math.floor(Number(sheetQty.value));

        if (!code || !isProbablyProductCode(code)) return setStatus("シート内コードが不正");
        if (!name) return setStatus("商品名が空です");
        if (!Number.isFinite(qty) || qty <= 0) return setStatus("数量は1以上");

        addOrUpdateMaster(code, name);
        addInventory(code, name, qty);
        renderTable();
        updateMasterSummary();

        updateLastRegistered(code, inventory.get(code)?.qty || qty);
        setStatus(`登録完了`, "success");
        showFlash(`登録 ${qty}`);
        soundRegistered();
        vibrate([50, 30, 70]);

        setDetectedFields("", "");
        qtyInput.value = "1";
        closeQtySheet();
      }

      function clearCurrent() {
        setDetectedFields("", "");
        qtyInput.value = "1";
        closeQtySheet();
        setStatus("クリア", "normal");
      }


      async function copyToClipboard() {
        if (inventory.size === 0) {
          setStatus("コピーするデータがないよ", "caution");
          return;
        }

        const rows = [["JAN", "商品名", "個数"]];
        for (const [code, row] of inventory.entries()) {
          rows.push([code, row.name || "", String(row.qty)]);
        }

        const text = rows.map(r => r.join("\t")).join("\n");

        try {
          await navigator.clipboard.writeText(text);
          setStatus("クリップボードにコピーしたよ", "success");
          showFlash("コピー完了");
          soundRegistered();
          vibrate([30]);
        } catch (err) {
          console.error(err);
          setStatus("コピー失敗", "warning");
        }
      }

      function exportCsv() {
        const rows = [["JAN", "商品名", "個数"]];
        for (const [code, row] of inventory.entries()) {
          rows.push([code, row.name || "", String(row.qty)]);
        }

        const csv = rows.map(r => r.map(escapeCsv).join(",")).join("\r\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);

        const d = new Date();
        const p = n => String(n).padStart(2, "0");
        const name = `inventory_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.csv`;

        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        setStatus(`CSV出力完了`, "success");
      }

      function splitCsvLine(line) {
        const out = [];
        let cur = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === "," && !inQuotes) {
            out.push(cur);
            cur = "";
          } else {
            cur += ch;
          }
        }
        out.push(cur);
        return out;
      }

      function parseCsv(text) {
        const lines = text.replace(/^\uFEFF/, "").split(/\r\n|\n|\r/).filter(l => l.trim() !== "");
        if (!lines.length) return { ok: false, error: "CSVが空です" };

        const header = splitCsvLine(lines[0]).map(v => v.trim().toLowerCase());
        const janIdx = header.findIndex(h => h === "jan" || h === "code");
        const nameIdx = header.findIndex(h => h === "name" || h === "product" || h === "product_name");

        if (janIdx === -1 || nameIdx === -1) {
          return { ok: false, error: "ヘッダは jan,name にしてください" };
        }

        const map = new Map();
        let skipped = 0;

        for (let i = 1; i < lines.length; i++) {
          const cols = splitCsvLine(lines[i]);
          const code = normalizeCode(cols[janIdx] ?? "");
          const name = normalizeName(cols[nameIdx] ?? "");
          if (!code || !name) {
            skipped++;
            continue;
          }
          map.set(code, name);
        }

        return { ok: true, map, skipped };
      }

      async function autoLoadMasterCsv() {
        try {
          const masterUrl = new URL("master.csv", location.href).toString();
          const res = await fetch(masterUrl, { cache: "no-store" });

          if (!res.ok) {
            setStatus(`商品リスト取得失敗: ${res.status}`);
            return false;
          }

          const text = await res.text();
          const result = parseCsv(text);

          if (!result.ok) {
            setStatus(`商品リスト読込失敗: ${result.error}`);
            return false;
          }

          productMaster.clear();
          for (const [code, name] of result.map.entries()) {
            productMaster.set(code, name);
          }

          updateMasterSummary();
          setStatus(`商品リスト読み込みOK`, "success");
          return true;
        } catch (err) {
          console.error(err);
          setStatus("商品リスト自動読込失敗");
          return false;
        }
      }

      function validateEAN13(code) {
        if (!/^\d{13}$/.test(code)) return false;
        const digits = code.split("").map(Number);
        const check = digits.pop();
        let sum = 0;
        for (let i = 0; i < digits.length; i++) {
          sum += digits[i] * (i % 2 === 0 ? 1 : 3);
        }
        return (10 - (sum % 10)) % 10 === check;
      }

      function validateEAN8(code) {
        if (!/^\d{8}$/.test(code)) return false;
        const digits = code.split("").map(Number);
        const check = digits.pop();
        let sum = 0;
        for (let i = 0; i < digits.length; i++) {
          sum += digits[i] * (i % 2 === 0 ? 3 : 1);
        }
        return (10 - (sum % 10)) % 10 === check;
      }

      function validateUPCA(code) {
        if (!/^\d{12}$/.test(code)) return false;
        const digits = code.split("").map(Number);
        const check = digits.pop();
        let sum = 0;
        for (let i = 0; i < digits.length; i++) {
          sum += digits[i] * (i % 2 === 0 ? 3 : 1);
        }
        return (10 - (sum % 10)) % 10 === check;
      }

      function hasValidCheckDigit(code) {
        if (/^\d{13}$/.test(code)) return validateEAN13(code);
        if (/^\d{12}$/.test(code)) return validateUPCA(code);
        if (/^\d{8}$/.test(code)) return validateEAN8(code);
        return false;
      }

      function getDetectRegion(videoEl) {
        const vw = videoEl.videoWidth || 0;
        const vh = videoEl.videoHeight || 0;
        if (!vw || !vh) return null;

        const sx = Math.floor(vw * DETECT_REGION.x);
        const sy = Math.floor(vh * DETECT_REGION.y);
        const sw = Math.floor(vw * DETECT_REGION.w);
        const sh = Math.floor(vh * DETECT_REGION.h);

        return { sx, sy, sw, sh };
      }

      function drawCenterCropToCanvas(videoEl) {
        const region = getDetectRegion(videoEl);
        if (!region || !detectCtx) return null;

        const { sx, sy, sw, sh } = region;
        if (sw <= 0 || sh <= 0) return null;

        detectCanvas.width = sw;
        detectCanvas.height = sh;
        detectCtx.clearRect(0, 0, sw, sh);
        detectCtx.drawImage(
          videoEl,
          sx, sy, sw, sh,
          0, 0, sw, sh
        );

        return detectCanvas;
      }

      async function initDetector() {
        if (!("BarcodeDetector" in window)) {
          detector = null;
          setStatus("BarcodeDetector未対応。手入力のみ");
          return false;
        }

        try {
          const formats = await window.BarcodeDetector.getSupportedFormats();
          const preferred = ["ean_13", "ean_8", "upc_a", "upc_e"];
          const useFormats = preferred.filter(f => formats.includes(f));
          detector = new window.BarcodeDetector(useFormats.length ? { formats: useFormats } : undefined);
          return true;
        } catch (err) {
          console.error(err);
          detector = null;
          setStatus("BarcodeDetector初期化失敗");
          return false;
        }
      }

      async function startCamera() {
        stopCamera();
        ensureAudioContext();

        if (!window.isSecureContext) return setStatus("HTTPSで開いてね");
        if (!navigator.mediaDevices) return setStatus("mediaDevicesなし");
        if (!navigator.mediaDevices.getUserMedia) return setStatus("getUserMediaなし");

        await initDetector();

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: useBackCamera ? { ideal: "environment" } : { ideal: "user" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              frameRate: { ideal: 30, max: 30 }
            }
          });

          video.srcObject = stream;
          await video.play();
          const track = stream.getVideoTracks()[0];
          track.applyConstraints({
            advanced: [{ focusMode: "continuous" }]
          });
          scanning = true;
          setStatus("カメラ起動", "success");
          hideCameraGuide();
          scanLoop();
        } catch (err) {
          console.error(err);
          if (err?.name === "NotAllowedError") setStatus("カメラ権限が拒否された");
          else if (err?.name === "NotFoundError") setStatus("カメラが見つからない");
          else if (err?.name === "NotReadableError") setStatus("他アプリがカメラ使用中かも");
          else setStatus("カメラ起動失敗: " + (err?.name || err));
        }
      }

      function stopCamera() {
        scanning = false;
        candidateCode = "";
        candidateCount = 0;

        if (rafId) cancelAnimationFrame(rafId);
        rafId = 0;

        if (video.srcObject) {
          for (const track of video.srcObject.getTracks()) track.stop();
          video.srcObject = null;
        }
        if (stream) {
          for (const track of stream.getTracks()) track.stop();
          stream = null;
        }
      }

      async function scanLoop() {
        if (!scanning) return;

        try {
          if (detector && video.readyState >= 2 && !qtySheet.classList.contains("show")) {
            const croppedSource = drawCenterCropToCanvas(video);

            if (croppedSource) {
              const barcodes = await detector.detect(croppedSource);

              if (barcodes?.length) {
                const raw = normalizeCode(barcodes[0].rawValue);
                const now = Date.now();

                if (raw && isProbablyProductCode(raw) && hasValidCheckDigit(raw)) {
                  if (raw === candidateCode) {
                    candidateCount += 1;
                  } else {
                    candidateCode = raw;
                    candidateCount = 1;
                  }

                  if (
                    candidateCount >= REQUIRED_CONSECUTIVE_DETECTIONS &&
                    (raw !== lastDetectedRaw || now - lastDetectedAt > SCAN_COOLDOWN_MS)
                  ) {
                    lastDetectedRaw = raw;
                    lastDetectedAt = now;
                    candidateCode = "";
                    candidateCount = 0;
                    applyDetectedCode(raw);
                  }
                } else {
                  candidateCode = "";
                  candidateCount = 0;
                }
              } else {
                candidateCode = "";
                candidateCount = 0;
              }
            }
          }
        } catch (err) {
          console.error(err);
        }

        rafId = requestAnimationFrame(scanLoop);
      }

      startBtn.addEventListener("click", async () => {
        await startCamera();
        await acquireWakeLock();
      });

      stopBtn.addEventListener("click", async () => {
        stopCamera();
        await releaseWakeLock();
        setStatus("カメラ停止", "normal");
        setStartGuide(true);
      });

      switchBtn.addEventListener("click", async () => {
        useBackCamera = !useBackCamera;
        await startCamera();
      });

      scanModeBtn.addEventListener("click", () => {
        continuousScanMode = !continuousScanMode;
        scanModeBtn.classList.toggle("active", continuousScanMode);
        scanModeBtn.textContent = continuousScanMode ? "連続モード ON" : "連続モード OFF";
        setStatus(continuousScanMode ? "連続スキャンモード ON" : "連続スキャンモード OFF", continuousScanMode ? "success" : "normal");
      });

      exportBtn.addEventListener("click", exportCsv);
      copyBtn.addEventListener("click", copyToClipboard);
      addBtn.addEventListener("click", addCurrentCode);
      clearCurrentBtn.addEventListener("click", clearCurrent);

      resetBtn.addEventListener("click", () => {
        if (!confirm("一覧を全削除する？")) return;
        inventory.clear();
        updateLastRegistered("", 0, "");
        renderTable();
        setStatus("全削除", "warning");
      });
      lastCode.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          const code = normalizeCode(lastCode.value);
          lastCode.value = code;
          const name = normalizeName(productName.value || getStoredName(code));
          if (name) productName.value = name;
          if (name) {
            qtyInput.focus({ preventScroll: true });
            qtyInput.select?.();
          } else {
            productName.focus({ preventScroll: true });
            productName.select?.();
          }
        }
      });

      productName.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          qtyInput.focus({ preventScroll: true });
          qtyInput.select?.();
        }
      });

      qtyInput.addEventListener("input", feedbackQty);
      sheetQty.addEventListener("input", feedbackQty);

      qtyInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          addCurrentCode();
        }
      });

      sheetNameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          sheetQty.focus({ preventScroll: true });
          sheetQty.select?.();
        }
      });

      sheetQty.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          addFromSheet();
        }
      });

      sheetAddBtn.addEventListener("click", addFromSheet);
      sheetCloseBtn.addEventListener("click", closeQtySheet);
      sheetCancelBtn.addEventListener("click", cancelInputWait);
      sheetClearBtn.addEventListener("click", clearSheetInputs);

      qtySheet.addEventListener("click", e => {
        if (e.target === qtySheet) cancelInputWait();
      });

      document.querySelectorAll("[data-setqty]").forEach(btn => {
        btn.addEventListener("click", () => {
          sheetQty.value = btn.dataset.setqty;
          feedbackQty();
          sheetQty.focus({ preventScroll: true });
        });
      });

      document.querySelectorAll("[data-key]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          if (key === "clear") {
            sheetQty.value = "";
          } else {
            sheetQty.value = (sheetQty.value === "0" ? "" : sheetQty.value) + key;
          }
          feedbackQty();
          sheetQty.focus({ preventScroll: true });
        });
      });

      renderTable();
      updateMasterSummary();
      updateLastRegistered("", 0, "");

      (async () => {
        const ok = await autoLoadMasterCsv();
        if (!ok) {
          setStatus(window.isSecureContext ? "商品リストの読込に失敗しました" : "HTTPSで開いてね", "warning");
          if (window.isSecureContext) {
            showCameraGuide("商品リストの読込に失敗しました");
          }
        } else {
          setStatus("商品リスト読み込みOK", "success");
          showCameraGuide("商品リスト読み込みOK / 開始を押してね");
        }
      })();
    })();
  </script>
</body>
</html>
